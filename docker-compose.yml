# Run the SmoothLlmImposter Host in a container with `docker compose` or
# `podman-compose`. `build: .` builds from the repo Dockerfile; `image:` lets
# you instead `pull` the published GHCR image. Keys come from your shell or a
# gitignored .env (compose auto-loads ./.env for ${...} interpolation).
#
# See .docs/wiki/setups/compose.run-smooth-llm-imposter.md
services:
  smooth-llm-imposter:
    image: ghcr.io/generic-automation-and-it/smooth-llm-imposter:latest
    build: .
    container_name: smooth-llm-imposter
    restart: unless-stopped
    ports:
      - "5066:5066"
    environment:
      ASPNETCORE_URLS: http://+:5066
      # Load appsettings.Development.json (the debug request dumps live behind its
      # Serilog `SmoothLlmImposter` Debug override). Drop this line to run Production-quiet.
      ASPNETCORE_ENVIRONMENT: Development
      # Upstream provider secrets — providers are keyed by NAME (HLD 007), not index,
      # so these survive any reordering of appsettings.json. The shipped imposters are
      # opencode-go, openrouter, opencode-anthropic; the two *-default real providers are
      # catch-all passthrough and take NO secret here. These use the conventional
      # <NAME>_<FIELD> surface (OPENCODE_GO_API_KEY → opencode-go's Secret, etc.); the
      # structured form Imposter__Providers__opencode-go__Secret is equivalent. AuthScheme
      # is decoupled from Dialect: opencode upstreams expect x-api-key, OpenRouter expects
      # Bearer. Supply secrets via shell export or a gitignored .env file; :- keeps compose
      # quiet when a secret is unset.
      OPENCODE_GO_API_KEY: ${OPENCODE_GO_API_KEY:-}
      OPENCODE_GO_AUTH_SCHEME: Bearer
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_AUTH_SCHEME: Bearer
      OPENCODE_ANTHROPIC_API_KEY: ${OPENCODE_GO_API_KEY:-}
      OPENCODE_ANTHROPIC_AUTH_SCHEME: ApiKey
    # Only needed for the optional /admin/credentials API (requires PostgreSQL):
    # persist Data Protection keys so stored secrets survive a container rebuild.
    # volumes:
    #   - slli-dpkeys:/home/app/.aspnet/DataProtection-Keys

# volumes:
#   slli-dpkeys:
