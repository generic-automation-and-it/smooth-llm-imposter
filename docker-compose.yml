# Run the SmoothLlmImposter Host in a container with `docker compose` or
# `podman-compose`. `build: .` builds from the repo Dockerfile; `image:` lets
# you instead `pull` the published GHCR image. Keys come from your shell or a
# gitignored .env (compose auto-loads ./.env for ${...} interpolation).
#
# See .docs/wiki/setups/compose.run-smooth-llm-imposter.md
services:
  smooth-llm-imposter:
    image: ghcr.io/generic-automation-and-it/smooth-llm-imposter:latest
    build: .
    container_name: smooth-llm-imposter
    restart: unless-stopped
    ports:
      - "5066:5066"
    environment:
      ASPNETCORE_URLS: http://+:5066
      # Load appsettings.Development.json (the debug request dumps live behind its
      # Serilog `SmoothLlmImposter` Debug override). Drop this line to run Production-quiet.
      ASPNETCORE_ENVIRONMENT: Development
      # Upstream provider secrets — index = provider order in appsettings.json
      # (0 anthropic-default, 1 openai-default, 2 opencode-go, 3 openrouter,
      # 4 opencode-anthropic). The two *-default real providers are catch-all
      # passthrough and take NO secret here. AuthScheme is decoupled from Dialect:
      # opencode upstreams expect x-api-key, OpenRouter expects Bearer. Supply
      # imposter secrets via shell export or a gitignored .env file; :- keeps
      # compose quiet when a secret is unset.
      Imposter__Providers__2__Secret: ${OPENCODE_GO_API_KEY:-}
      Imposter__Providers__2__AuthScheme: Bearer
      Imposter__Providers__3__Secret: ${OPENROUTER_API_KEY:-}
      Imposter__Providers__3__AuthScheme: Bearer
      Imposter__Providers__4__Secret: ${OPENCODE_GO_API_KEY:-}
      Imposter__Providers__4__AuthScheme: ApiKey
    # Only needed for the optional /admin/credentials API (requires PostgreSQL):
    # persist Data Protection keys so stored secrets survive a container rebuild.
    # volumes:
    #   - slli-dpkeys:/home/app/.aspnet/DataProtection-Keys

# volumes:
#   slli-dpkeys:
