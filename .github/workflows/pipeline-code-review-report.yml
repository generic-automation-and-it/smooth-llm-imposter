# Thin caller for the smooth-ai-report-review reusable workflow.
#
# Copy this file into your repo as .github/workflows/pipeline-code-review-report.yml
# (any name works). It is the only workflow file you need — the review job, its
# scripts, and its config are fetched from generic-automation-and-it/smooth-ai-report-review
# at the ref you pin below.
#
# Configuration (set in YOUR repo/org):
#   Secrets   — the selected provider's API key, canonical names:
#               OPENCODE_GEMINI_API_KEY / OPENCODE_COPILOT_API_KEY /
#               OPENCODE_OPENAI_API_KEY / OPENCODE_ANTHROPIC_API_KEY /
#               OPENCODE_GO_OPENAI_API_KEY / OPENCODE_GO_ANTHROPIC_API_KEY /
#               OPENCODE_OPENROUTER_API_KEY.
#               The explicit `secrets:` mapping below works whether your repo is in
#               the SAME org as the gate or a DIFFERENT one. `secrets: inherit` is a
#               shortcut but only works SAME-org/enterprise — cross-org callers MUST
#               map the keys explicitly (GitHub rejects cross-org inherit at startup).
#   Variables — OPENCODE_REVIEW_REPORT_PROVIDER, OPENCODE_REVIEW_REPORT_<P>_URL,
#               OPENCODE_REVIEW_REPORT_MODEL_{PRIMARY,SECONDARY,ORCHESTRATOR}, etc.
#               These resolve against the CALLER repo/org automatically.
#
# Versioning: pin @v1 (floating major) or an exact tag/SHA for stricter supply-chain
# control. The review scripts are fetched at the same ref as the workflow by default.
#
# Optional autonomous low/medium fixing: copy
# .github/workflows/pipeline-ai-analyse.yml into the consuming repo too. It cannot be
# a reusable workflow caller because workflow_run must live in the repo whose gate
# run it observes. The workflow name-couples to "OpenCode Review Report" and always
# reads the OPENCODE_ANALYSE_MODEL / OPENCODE_ANALYSE_MAX_INCREMENTAL Variables,
# falling back to literal defaults (gemini-3.1-pro-preview / 3) when they are unset.

name: OpenCode Review Report

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: string
      model:
        description: 'Primary review model ID (optional). Ignored when "model_preset" is set. Must be a model of the selected OPENCODE_REVIEW_REPORT_PROVIDER.'
        required: false
        type: string
        default: ''
      model_preset:
        # COUPLED to the reusable workflow's preset→provider/model env mapping —
        # this dropdown only names the presets; the mapping lives in the callee.
        # When the callee adds a preset option, extend this list to expose it.
        description: 'Model preset (optional). Selecting one overrides the provider AND all three model tiers — takes precedence over "model" and the repo OPENCODE_REVIEW_REPORT_* Variables.'
        required: false
        type: choice
        default: '(repository default)'
        options:
          - '(repository default)'
          - 'Anthropic Claude Opus 4.8'
          - 'Anthropic Claude Sonnet 4.6'
          - 'Anthropic Claude Haiku 4.5'
          - 'OpenAI GPT-5.5'
          - 'OpenCode DeepSeek V4 Pro'
          - 'OpenCode GLM-5.1'
          - 'OpenCode MiniMax m3'
          - 'OpenCode Qwen3.7 Plus'
          - 'OpenRouter DeepSeek V4 Pro'
          - 'OpenRouter Qwen3.7 Plus'
          - 'OpenRouter GLM-5.1'
          - 'OpenRouter MiniMax M3'
      disable_claude_code:
        description: 'Disable Claude Code (.claude) support (1=disabled, 0=enabled). Avoids conflicts between opencode and Claude Code directories.'
        required: false
        type: choice
        default: '1'
        options:
          - '1'
          - '0'
      disable_agents_md_check:
        description: 'Disable AGENTS.md documentation validation (1=disabled, 0=enabled). Default: 0.'
        required: false
        type: choice
        default: '0'
        options:
          - '0'
          - '1'

# The caller's permissions bound the GITHUB_TOKEN the called workflow receives.
permissions:
  pull-requests: write
  contents: read
  issues: write

# Same selective concurrency as the callee: shared group per PR for pull_request
# events (latest commit wins), unique group for manual/comment triggers.
concurrency:
  group: ${{ github.event_name == 'pull_request' && format('ai-review-{0}', github.event.pull_request.number) || format('{0}-{1}', github.run_id, github.run_attempt) }}
  cancel-in-progress: true

jobs:
  review:
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false) ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '/ai-review') &&
        (
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        )
      ) ||
      (github.event_name == 'workflow_dispatch')
    uses: generic-automation-and-it/smooth-ai-report-review/.github/workflows/pipeline-code-review-report.yml@v1
    with:
      pr_number: ${{ inputs.pr_number || '' }}
      model: ${{ inputs.model || '' }}
      model_preset: ${{ inputs.model_preset || '(repository default)' }}
      disable_claude_code: ${{ inputs.disable_claude_code || '1' }}
      disable_agents_md_check: ${{ inputs.disable_agents_md_check || vars.OPENCODE_REVIEW_REPORT_DISABLE_AGENTS_MD_CHECK || '0' }}
      # runner: self-hosted          # uncomment for private-network gateways
      # tools_ref: main              # override which ref the review scripts come from
      # mandatory_context_files: >-  # override the context files resolved in YOUR repo
      #   AGENTS.md
      #   .docs/nfr/PROJECT_SETUP_AGENTS.md
      # agents_md_exempt_paths: '.docs/release-notes'
    # Explicit mapping works for same-org AND cross-org callers. Only the selected
    # provider's key needs to exist in your repo/org; unset ones resolve empty and
    # are never used. (Same-org callers may replace this whole block with
    # `secrets: inherit` — but that fails at startup if the gate is in another org.)
    secrets:
      OPENCODE_GEMINI_API_KEY: ${{ secrets.OPENCODE_GEMINI_API_KEY }}
      OPENCODE_COPILOT_API_KEY: ${{ secrets.OPENCODE_COPILOT_API_KEY }}
      OPENCODE_OPENAI_API_KEY: ${{ secrets.OPENCODE_OPENAI_API_KEY }}
      OPENCODE_ANTHROPIC_API_KEY: ${{ secrets.OPENCODE_ANTHROPIC_API_KEY }}
      OPENCODE_GO_OPENAI_API_KEY: ${{ secrets.OPENCODE_GO_OPENAI_API_KEY }}
      OPENCODE_GO_ANTHROPIC_API_KEY: ${{ secrets.OPENCODE_GO_ANTHROPIC_API_KEY }}
      OPENCODE_OPENROUTER_API_KEY: ${{ secrets.OPENCODE_OPENROUTER_API_KEY }}
