name: PR Gate

on:
  push:
    branches:
      - main
    paths:
      - Directory.Packages.props
      - src/**
      - tests/**
      - .github/actions/**
      - .github/workflows/pr-gate.yml
  pull_request:
    branches:
      - main
    paths:
      - Directory.Packages.props
      - src/**
      - tests/**
      - .github/actions/**
      - .github/workflows/pr-gate.yml
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    env:
      BUILD_CONFIGURATION: Release
      DOTNET_VERSION: 10.0.x

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration "$BUILD_CONFIGURATION" --no-restore

      - name: Aspire test with coverage
        uses: ./.github/actions/aspire-test-with-coverage
        timeout-minutes: 25
        with:
          build-configuration: ${{ env.BUILD_CONFIGURATION }}
          artifacts-root: artifacts

      - name: Publish coverage summary
        if: always()
        run: |
          if [ -f artifacts/coverage/SummaryGithub.md ]; then
            cat artifacts/coverage/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: artifacts/coverage/
          if-no-files-found: warn
