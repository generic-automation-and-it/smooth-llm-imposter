name: PR Gate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: filter
        name: Detect relevant changes
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            # push to main and manual dispatch always run the full gate
            echo "src=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only \
                "${{ github.event.pull_request.base.sha }}" \
                "${{ github.event.pull_request.head.sha }}" \
              | grep -qE '^(\.config/|\.github/|Directory\.Packages\.props|SmoothLlmImposter\.slnx|src/|tests/)'; then
            echo "src=true" >> "$GITHUB_OUTPUT"
          else
            echo "src=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-test:
    needs: [changes]
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    env:
      BUILD_CONFIGURATION: Release
      DOTNET_VERSION: 10.0.x

    services:
      wiremock:
        image: wiremock/wiremock:3.13.1
        ports:
          - 19091:8080

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore SmoothLlmImposter.slnx

      - name: Build
        run: dotnet build SmoothLlmImposter.slnx --configuration "$BUILD_CONFIGURATION" --no-restore

      - name: Test with coverage
        uses: ./.github/actions/test-with-coverage
        timeout-minutes: 25
        with:
          build-configuration: ${{ env.BUILD_CONFIGURATION }}
          artifacts-root: artifacts
          wiremock-url: http://127.0.0.1:19091

      - name: Publish coverage summary
        if: always()
        run: |
          if [ -f artifacts/coverage/SummaryGithub.md ]; then
            cat artifacts/coverage/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: artifacts/coverage/
          if-no-files-found: warn

  ci-gate:
    needs: [build-and-test]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require build-and-test to pass or be skipped
        run: |
          result="${{ needs.build-and-test.result }}"
          if [[ "$result" == "success" || "$result" == "skipped" ]]; then
            echo "CI gate passed (build-and-test: $result)"
          else
            echo "CI gate failed (build-and-test: $result)"
            exit 1
          fi
